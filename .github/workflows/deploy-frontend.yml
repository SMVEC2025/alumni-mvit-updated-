name: Deploy Frontend (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── Build ──────────────────────────────────────────────────────────────
      # Repo secrets required:
      #   VITE_API_BASE_URL       — e.g. https://api.smvec.ac.in/api
      #   VITE_TURNSTILE_SITE_KEY — Cloudflare Turnstile site key (public)
      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      # ── Deploy to Cloudflare Pages ─────────────────────────────────────────
      # Repo secrets required:
      #   CLOUDFLARE_API_TOKEN  — Pages:Edit permission scoped to the project
      #   CLOUDFLARE_ACCOUNT_ID — found on the right side of your CF dashboard
      #   CF_PAGES_PROJECT      — Cloudflare Pages project name
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ secrets.CF_PAGES_PROJECT }} --commit-dirty=true
